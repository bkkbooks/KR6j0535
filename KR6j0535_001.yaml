body:
  text: 一行撰虛空藏印合掌縛水指風指如寶形真言曰唵阿伽沙一迦羅波伊野二唵麼哩三伽摩哩四母梨五娑嚩賀若人欲求福智當歸依此菩薩日月星皆虛空藏所變也文殊印虛空合掌以大指各押二水甲二風屈捻空端真言曰唵引阿引入惡聲味引羅吽佉左洛若求息災當欲殄滅七種災難所謂日月薄喰五星違失常度兵賊競起水旱不時風雨失度惡臣背逆損害國民武狼惡獸食噉衆生五穀不登如是災禍急厄官府王難死厄怖等皆當消散普賢印虛心合掌真言曰支波啄一決定毗尼波啄二斷結鳥蘇波啄三盡生死此呪平旦誦七遍夜七遍厭魅野道蟲毒皆悉消滅能得身心慧三解脫後生不受生死之身獲得法身內外國土怨賊一切惡人一切鬼神一切盜賊虎狼師子毒蟲惡獸聞此呪聲皆口噤閉不相惱亂天變致厄惡夢災殃百鳥怪異自然消滅此呪功能不可說盡延命印左手捻火指空指如持蓮花右手直申如垂真言曰唵引摩折羅喻碎某甲娑嚩賀若誦此呪延命除災帝釋天印右手作拳安腰左手直豎相著地水二指屈中節以風著火背屈空中節真言曰唵因捺羅野娑嚩賀若誦此呪授與官位滿足所求毗沙門天印虛心合掌交二空並竪二風付二火側如鉤端相去一寸不著真言曰唵吠室羅縛拏野娑嚩賀若誦此呪得大富饒晝夜守護日天真言曰曩謨羅怛曩二合怛羅夜引野曩莫索里野薩嚩曩乞灑二合怛羅二合羅若野唵引阿謨伽烏名位設底娑嚩二合賀月天真言曰唵戰上怛羅二合曩乞灑二合引怛羅二合羅惹野名位設底娑嚩二合賀火星真言曰唵阿誐羅嚕擬野名位莎訶水星真言曰唵母馱曩乞殺二合怛羅二合弭曩名位契努摩莎賀木星真言曰唵婆羅二合訶薩鉢二合底曩摩比跢嚩曩師名位摩攞嚩羅引馱二合寧娑嚩賀金星真言曰唵戌羯羅誐馱嚩二合羅惹野名位室里二合迦里娑嚩賀土星真言曰唵引捨泥殺作二合羅曩乞殺二合怛羅二合跛羅二合訶摩曩嚕波野名位普瑟底二合迦里莎訶羅睺星真言曰唵羅戶曩阿素羅二合邏惹野塞摩捨都曩野名位扇底迦里娑嚩賀計都星真言曰唵嚩日囉二合計都曩乞殺二合怛羅二合邏惹野名位娑嚩賀九執曜天印堅固合掌二空相並直竪二風舒名本開立來去真言曰唵一蘖羅二合係濕嚩二合二里耶三鉢羅鉢多四珠底五摩野六娑嚩賀二十八宿印堅固合掌並二空直立當心以二空召之真言曰唵諾乞灑二合怛羅二合爼寧吉反蘇那儞曳莎訶先奉供虛空藏文殊普賢延命帝釋毗沙門等菩薩天等後勸請九曜二十八宿天北斗之中本命屬星及以泰山府君司命司祿供之祈乞除災延命消除厄害之事耳能吉祥真言曰曩謨羅怛曩二合怛羅二合夜野一曩莫素摩薩羅嚩二合諾訖灑二合怛羅二合邏引惹上野者者都地波阿去引路迦羅野怛儞也意他努摩底跛努摩底薩賓上儞佉上細娑嚩賀誦此九曜息災大白衣觀音陀羅尼若日月在人本命宮中及五星在本命宮鬪戰失度可立大白衣觀音或文殊八字熾盛光佛頂等道場各依本法念誦一切災難自然消散一切曜不吉祥誦此真言成能吉祥北斗七星真言曰唵颯跢曩而齒曩野伴惹密野二合染普他摩娑嚩二合弭曩名位羅訖山婆嚩都莎訶若羅睺計都暗行人本命星宮須誦此北斗真言一切如來說破一切宿曜障吉祥真言曰唵薩羅嚩諾剎怛羅二合三摩曳室里曳扇底迦俱嚕娑嚩賀金剛宿成就經吉祥成就品曰我今宣說世間成就妙祕法如是諸曜運行虛空若一若二三四五等臨入衆生命宿對衝宿遷移宿大殺業宿安宿薄相宿奴婢宿作諸厄害四大惡曜所謂火曜土曜羅睺計都最重衆生是時修諸福業廣施仁慈或依文殊八字真言或依熾盛光佛頂或依被葉衣觀音或依一字王佛頂立大息災護摩壇場各依本法念誦供養一切災難自然消滅作成就法於心宿直日柳宿直日昴宿直日牛宿直日不簡日月吉凶但於此宿直日於一日之中不食念誦滿一千八十遍所有心願應時便渴大悉地若厄難時於本生日最相應若作木曜成就法者月十六日最為相應若作火曜成就法者即彼直日最為相應若作土曜成就法者每月七日最為相應若作金曜成就法者隨所見方平旦最為相應若作水曜成就法者依水曜直日而作成就若作羅睺計都法者依本生日以為相應若復供養本生宿者於本生年月若本生日而可取成就若惡宿生每月供養若三日七日供養直轉成吉祥直祕勿令知俗也
